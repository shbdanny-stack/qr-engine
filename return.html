<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Returning to Shiny Happy</title>

  <!-- Mobile viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const client = supabase.createClient(
      "https://wowdmkxuwysuihgoklki.supabase.co",
      "sb_publishable_nlHqvZhnjR3PO-HsqgY2qw_aCw2yF4Y"
    );

    async function handleReturn() {
      // 1. Let Supabase process the magic link
      const { data, error } = await client.auth.getSession();

      if (error || !data.session) {
        document.getElementById("status").textContent = "Login failed. Try again.";
        return;
      }

      const email = data.session.user.email;

      // 2. Look up the user by email
      const { data: users } = await client
        .from("users")
        .select("*")
        .eq("email", email)
        .limit(1);

      let user = users && users[0];

      // 3. If no user exists yet, create one
      if (!user) {
        const base = email.split("@")[0];
        const { data: newUsers } = await client
          .from("users")
          .insert([
            {
              shiny_side_id: base,
              name: base,
              email: email,
              claimed: true
            }
          ])
          .select("*");

        user = newUsers[0];
      }

      // 4. Save user locally
      localStorage.setItem("shiny_user", JSON.stringify(user));

      // 5. Redirect to Quest Board
      window.location.href = "experience.html";
    }

    window.onload = handleReturn;
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: #000;
      color: #fff;
      font-family: "Baloo 2", sans-serif;
    }

    body {
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    h2 {
      margin: 0;
      font-size: 26px;
      color: #01a9ce;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    @media (max-width: 480px) {
      body {
        padding: 30px 16px;
      }

      h2 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <h2 id="status">Logging you in…</h2>
</body>
</html>
