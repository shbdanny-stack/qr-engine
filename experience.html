<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Shiny Happy Engine</title>

  <!-- Load Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://wowdmkxuwysuihgoklki.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_nlHqvZhnjR3PO-HsqgY2qw_aCw2yF4Y";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    #identityBox {
      padding: 15px;
      border: 2px solid #ccc;
      margin-bottom: 20px;
      border-radius: 8px;
    }
    #identityBox input {
      padding: 8px;
      font-size: 16px;
      width: 200px;
    }
    #identityBox button {
      padding: 8px 12px;
      font-size: 16px;
      margin-left: 10px;
    }
  </style>
</head>

<body>

  <div id="identityBox">
    <h3>Enter your ShinySide ID</h3>
    <input id="ssidInput" placeholder="ShinySide ID" />
    <button id="ssidSubmit">Go</button>

    <div id="emailClaimBox" style="display:none; margin-top:10px;">
      <p>This ShinySide ID is claimed. Enter your email to continue.</p>
      <input id="emailInput" placeholder="Email" />
      <button id="emailSubmit">Verify</button>
    </div>

    <p id="identityStatus" style="color: green; margin-top: 10px;"></p>
  </div>

  <h1>Shiny Happy Engine Loaded</h1>
  <p>If you see this, the page is working. The engine will run in the background.</p>

  <script>
    let currentUser = null;

    // Load saved user on page load
    window.addEventListener("load", () => {
      try {
        const saved = localStorage.getItem("shiny_user");
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed && parsed.shiny_side_id) {
            currentUser = parsed;
            document.getElementById("identityStatus").innerText =
              "Welcome back, " + currentUser.shiny_side_id + "!";
            document.getElementById("identityBox").style.display = "none";
          }
        }
      } catch (e) {
        localStorage.removeItem("shiny_user");
      }
    });

    // Handle ShinySide ID submission
    document.getElementById("ssidSubmit").addEventListener("click", async () => {
      const ssid = document.getElementById("ssidInput").value.trim();
      if (!ssid) return;

      // Fetch user without .single() to avoid 406 breaking flow
      const { data: users, error } = await client
        .from("users")
        .select("*")
        .eq("shiny_side_id", ssid);

      const user = users && users.length > 0 ? users[0] : null;

      if (user) {
        if (user.claimed) {
          document.getElementById("emailClaimBox").style.display = "block";
        } else {
          currentUser = user;
          localStorage.setItem("shiny_user", JSON.stringify(user));
          document.getElementById("identityStatus").innerText =
            "Welcome, " + ssid + "!";
          document.getElementById("identityBox").style.display = "none";
        }
      } else {
        // Create new user
        const { data: newUsers, error: insertErr } = await client
          .from("users")
          .insert([
            {
              shiny_side_id: ssid,
              name: ssid,
              claimed: false
            }
          ])
          .select("*");

        if (insertErr) {
          console.error("Insert error:", insertErr);
          alert("Error creating user.");
          return;
        }

        const newUser = newUsers && newUsers[0] ? newUsers[0] : null;
        if (!newUser) {
          alert("Error creating user.");
          return;
        }

        currentUser = newUser;
        localStorage.setItem("shiny_user", JSON.stringify(currentUser));
        document.getElementById("identityStatus").innerText =
          "Welcome, " + ssid + "!";
        document.getElementById("identityBox").style.display = "none";
      }
    });

    // Handle email verification for claimed IDs
    document.getElementById("emailSubmit").addEventListener("click", async () => {
      const ssid = document.getElementById("ssidInput").value.trim();
      const email = document.getElementById("emailInput").value.trim();
      if (!ssid || !email) return;

      const { data: users, error } = await client
        .from("users")
        .select("*")
        .eq("shiny_side_id", ssid)
        .eq("email", email);

      const user = users && users.length > 0 ? users[0] : null;

      if (user) {
        currentUser = user;
        localStorage.setItem("shiny_user", JSON.stringify(user));
        document.getElementById("identityStatus").innerText =
          "Welcome back, " + ssid + "!";
        document.getElementById("identityBox").style.display = "none";
      } else {
        alert("Email does not match this ShinySide ID.");
      }
    });
  </script>

  <!-- Load Engine LAST so it doesn't stomp identity UI -->
  <script src="https://raw.githubusercontent.com/shbdanny-stack/qr-engine/main/engine.js"></script>

</body>
</html>
